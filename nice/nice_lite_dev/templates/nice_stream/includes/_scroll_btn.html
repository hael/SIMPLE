{% comment %}
  _scroll_btn.html — circular scroll arrow button for snap-scroll sliders.

  Parameters:
    direction — "left" | "right"
    action    — full onclick expression, e.g. "scrlLeft(this, event)"
{% endcomment %}
<button type="button"
        class="w-6 h-6 rounded-full hover:bg-streambg border border-streamline flex items-center justify-center text-streamlabel hover:text-streamtext hover:border-streamlabel/50 transition-colors flex-shrink-0"
        onclick="{{ action }}">
    {% if direction == "left" %}
        <svg class="w-3.5 h-3.5" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="7,2 3,6 7,10"/>
        </svg>
    {% else %}
        <svg class="w-3.5 h-3.5" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5,2 9,6 5,10"/>
        </svg>
    {% endif %}
</button>
