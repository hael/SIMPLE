<div id="waitinggauze"
     class="flex flex-1 items-center justify-center text-[10px] text-streamlabel bg-streambar">
    {% if status == "skipped" %}
        {{ status }}
    {% elif "stage" in jobstats %}
        {{ jobstats.stage }} &hellip;
    {% else %}
        waiting &hellip;
    {% endif %}
</div>
