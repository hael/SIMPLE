<div class="flex items-center px-4 pt-3 pb-2 border-b border-streamline flex-shrink-0">
    <div class="flex-1 text-[10px] font-medium text-streamlabel uppercase tracking-widest">log</div>
    <div class="flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-streamaction animate-pulse"></span>
        <span class="text-[10px] text-streamlabel">running</span>
    </div>
</div>
<div class="logtext js-expandable-panel flex-1 overflow-auto mx-2 my-2 p-3 bg-streambg border border-streamdivider rounded-lg cursor-zoom-in" title="click to expand">
    {% for logpart in log %}
        {% if "text" in logpart %}
            <pre class="text-[10px] text-streamsubtle">{{ logpart.text }}</pre>
        {% elif "image" in logpart %}
            <img src="{% url 'nice_lite:image' logpart.image %}" loading="lazy"/>
        {% endif %}
    {% endfor %}
</div>
<script>
    (function () {
        var panels = document.querySelectorAll('.js-expandable-panel');

        function getExpandTarget(panel) {
            return panel.parentElement;
        }

        function expandPanel(panel) {
            var target = getExpandTarget(panel);
            if (!target) return;

            panel.workspace.expanded = '1';
            panel.workspace.expandTargetOriginalStyle = target.getAttribute('style') || '';

            target.style.position = 'fixed';
            target.style.inset = '0';
            target.style.width = 'calc(100vw - 0.5rem)';
            target.style.height = 'calc(100vh - 0.5rem)';
            target.style.maxHeight = 'none';
            target.style.margin = '0.25rem';
            target.style.borderRadius = '0.5rem';
            target.style.zIndex = '9999';

            panel.classList.add('cursor-zoom-out');
            panel.classList.remove('cursor-zoom-in');
            panel.title = 'click to collapse';
            document.body.style.overflow = 'hidden';
        }

        function collapsePanel(panel) {
            var target = getExpandTarget(panel);
            if (!target) return;

            panel.workspace.expanded = '0';
            target.setAttribute('style', panel.workspace.expandTargetOriginalStyle || '');

            panel.classList.remove('cursor-zoom-out');
            panel.classList.add('cursor-zoom-in');
            panel.title = 'click to expand';
            document.body.style.overflow = '';
        }

        panels.forEach(function (panel) {
            if (panel.workspace.expandBound === '1') return;
            panel.workspace.expandBound = '1';
            panel.workspace.expanded = '0';

            panel.addEventListener('click', function () {
                if (panel.workspace.expanded === '1') {
                    collapsePanel(panel);
                } else {
                    panels.forEach(function (otherPanel) {
                        if (otherPanel !== panel && otherPanel.workspace.expanded === '1') {
                            collapsePanel(otherPanel);
                        }
                    });
                    expandPanel(panel);
                }
            });
        });
    })();
</script>
{% if error %}
    <div class="flex items-center gap-2 mt-2 px-2">
        <svg class="w-3.5 h-3.5 text-streamerror flex-shrink-0" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="7" cy="7" r="5.5"/><line x1="7" y1="5" x2="7" y2="7.5"/><circle cx="7" cy="9.5" r="0.5" fill="currentColor"/>
        </svg>
        <span class="text-[11px] text-streamsubtle">errors</span>
    </div>
    <div class="js-expandable-panel h-[75px] overflow-auto mx-2 mb-2 mt-1 p-3 bg-streamerrorsurface border border-streamerrorline rounded-lg cursor-zoom-in" title="click to expand">
        <pre class="text-[10px] text-streamerror">{{error}}</pre>
    </div>
{% endif %}
