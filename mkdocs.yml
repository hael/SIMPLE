site_name: SIMPLE
site_description: Documentation for the SIMPLE cryo-EM image processing and reconstruction platform.
site_url: https://hael.github.io/SIMPLE/
repo_url: https://github.com/hael/SIMPLE
repo_name: hael/SIMPLE
docs_dir: doc
site_dir: site
use_directory_urls: true

theme:
  name: readthedocs
  highlightjs: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - footnotes
  - tables
  - toc:
      permalink: true
