{% load static %}
{% load random_numbers %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'nice_lite/nice_lite.css' %}">
</head>
<body class="bg-streambg min-h-screen font-sans">
    <div class="px-5 pt-4">
        {% if mode == "stream" %}
            <a class="inline-flex items-center gap-1.5 text-xs text-streamsubtle hover:text-streamtext transition-colors"
               href={% url 'nice_lite:dataset' %} title="back">
        {% else %}
            <a class="inline-flex items-center gap-1.5 text-xs text-streamsubtle hover:text-streamtext transition-colors"
               href={% url 'nice_lite:workspace' %} title="back">
        {% endif %}
            <svg class="w-3.5 h-3.5" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 3L5 8l5 5"/>
            </svg>
            back
        </a> 
    </div>

    <div class="flex justify-center px-5 pt-10 pb-16">
        <div class="relative w-full max-w-fit">

            <div class="absolute -top-6 left-1/2 -translate-x-1/2 z-10 flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-streamaccent flex items-center justify-center shadow-sm">
                    <svg class="w-6 h-6" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="1,8 3,4 5,11 7,6 9,10 11,3 13,8 15,8"/>
                    </svg>
                </div>
            </div>

            <div class="bg-streambar rounded-xl border border-streamline pt-14 pb-6 px-6">
                <h1 class="text-sm font-semibold text-streamtext text-center mb-6">new project</h1>

                <form method="POST" action={% url 'nice_lite:create_project' %} target="_parent">
                    {% csrf_token %}

                    <div class="grid grid-cols-[auto_2fr] gap-x-6 gap-y-3 items-start text-xs">
                        <label class="font-medium text-streamtext whitespace-nowrap" for="new_project_name">project name</label>
                        <input id="new_project_name" name="new_project_name" required
                               class="w-full text-xs px-2 py-1 border border-streamline rounded-lg bg-streamsurface text-streaminput focus:outline-none focus:ring-1 focus:ring-streamring">

                        <label class="font-medium text-streamtext whitespace-nowrap" for="new_project_dirc">project folder</label>
                        <div class="relative flex items-center">
                            <input id="new_project_dirc" class="w-full text-xs px-2 py-1 pr-7 border border-streamline rounded-lg bg-streamsurface text-streaminput focus:outline-none focus:ring-1 focus:ring-streamring"
                                   name="new_project_dirc" required>
                            <button type="button" title="browse for directory"
                                    onclick="this.parentElement.querySelector('.dirselector').classList.remove('hidden')"
                                    class="absolute right-1.5 text-streamicon hover:text-streamsubtle transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4">
                                    <path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h2.879a1.5 1.5 0 0 1 1.06.44l1.122 1.12A1.5 1.5 0 0 0 9.62 4H12.5A1.5 1.5 0 0 1 14 5.5v1.401a2.986 2.986 0 0 0-1.5-.401h-9c-.546 0-1.059.146-1.5.401V3.5ZM2 9.5v3A1.5 1.5 0 0 0 3.5 14h9a1.5 1.5 0 0 0 1.5-1.5v-3A1.5 1.5 0 0 0 12.5 8h-9A1.5 1.5 0 0 0 2 9.5Z" />
                                </svg>
                            </button>
                            <iframe name="FS{% random_int 1 10000 %}"
                                    class="dirselector hidden fixed inset-0 w-full h-full z-50 bg-streambg"
                                    src={% url 'nice_lite:file_browser' 'dir' %}>
                            </iframe>
                        </div>

                        <label class="font-medium text-streamtext whitespace-nowrap" for="new_project_desc">project description</label>
                        <textarea id="new_project_desc" name="new_project_desc" rows="4"
                                  class="w-full text-xs px-2 py-1 border border-streamline rounded-lg bg-streamsurface text-streaminput focus:outline-none focus:ring-1 focus:ring-streamring"></textarea>
                    </div>

                    <div class="flex justify-center mt-6">
                        <input type="submit" value="create"
                               class="text-xs px-6 py-1.5 rounded-lg font-medium bg-streamaccent text-white hover:bg-streamring transition-colors cursor-pointer">
                    </div>
                </form>
            </div>
        </div>
    </div>

    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
