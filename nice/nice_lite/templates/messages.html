{% if messages %}
  <ul id="message_alert" class="messages absolute bg-nice4header w-full bottom-0">
    {% for message in messages %}
      <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
    {% endfor %}
  </ul>
  <script>
    setTimeout(() => { document.querySelector("#message_alert").style.display="none" }, 1000)
  </script>
{% endif %}
